# Template configuration: defines the standard directory structure and file
# generation order for each template type.
#
# Each template lists files with:
#   - path: Relative path within the Flutter project
#   - purpose: Description used as context for the code generation prompt
#   - order: Generation order (lower = earlier). Files are generated in this
#            order so that later files can reference already-generated ones.

common_files:
  # --- Config & manifest ---
  - path: "pubspec.yaml"
    purpose: >
      Flutter project manifest. Includes all dependencies from the PRD,
      Flutter SDK >=3.22.0, Dart SDK >=3.4.0, flutter_localizations (sdk: flutter).
    order: 0

  - path: "analysis_options.yaml"
    purpose: "Dart analysis options using flutter_lints recommended rules."
    order: 1

  # --- Theme ---
  - path: "lib/theme/app_theme.dart"
    purpose: >
      Material Design 3 theme: lightTheme and darkTheme using
      ColorScheme.fromSeed with useMaterial3: true.
    order: 10

  # --- Ad config ---
  - path: "lib/config/ad_config.dart"
    purpose: >
      AdMob configuration with test ad unit IDs. Platform-aware helper
      for Android (ca-app-pub-3940256099942544/6300978111) and
      iOS (ca-app-pub-3940256099942544/2934735716).
    order: 11

  # --- Localisation ---
  - path: "lib/l10n/app_en.arb"
    purpose: "English ARB localisation file with all user-facing strings."
    order: 12

  - path: "lib/l10n/app_ja.arb"
    purpose: "Japanese ARB localisation file with all user-facing strings."
    order: 13

  # --- Core providers ---
  - path: "lib/providers/theme_provider.dart"
    purpose: >
      Riverpod provider for theme mode (light/dark/system).
      Persists selection with shared_preferences.
    order: 20

  - path: "lib/providers/locale_provider.dart"
    purpose: >
      Riverpod provider for app locale (en/ja).
      Persists selection with shared_preferences.
    order: 21

  # --- Router ---
  - path: "lib/router/app_router.dart"
    purpose: >
      GoRouter configuration with all routes from the PRD.
      Exposed as a Riverpod provider.
    order: 30

  # --- Shared widgets ---
  - path: "lib/widgets/ad_banner_widget.dart"
    purpose: >
      Reusable AdMob banner widget using google_mobile_ads.
      Handles ad loading, error states, and proper disposal.
    order: 40

  # --- Entry points (generated last) ---
  - path: "lib/main.dart"
    purpose: >
      App entry point: initialise WidgetsBinding, MobileAds,
      then run the app wrapped in ProviderScope.
    order: 90

  - path: "lib/app.dart"
    purpose: >
      Root MaterialApp.router widget wiring GoRouter, theme,
      locale, and localisation delegates.
    order: 91


# ============================================================================
# Template-specific files
# ============================================================================

templates:
